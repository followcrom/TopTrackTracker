name: Sync SURFACE/DESKTOP branches

on:
  push:
    branches:
      - SURFACE
      - DESKTOP

jobs:
  open-sync-pr:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine source/target branches
        id: branches
        run: |
          case "${{ github.ref_name }}" in
            SURFACE) target=DESKTOP ;;
            DESKTOP) target=SURFACE ;;
          esac
          echo "source=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: Open or update sync PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE: ${{ steps.branches.outputs.source }}
          TARGET: ${{ steps.branches.outputs.target }}
        run: |
          ahead=$(git rev-list --count "origin/${TARGET}..origin/${SOURCE}")
          if [ "$ahead" -eq 0 ]; then
            echo "No new commits on $SOURCE ahead of $TARGET - skipping."
            exit 0
          fi

          existing=$(gh pr list --head "$SOURCE" --base "$TARGET" --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open from $SOURCE into $TARGET - the new commits will show up on it automatically."
            exit 0
          fi

          gh pr create \
            --head "$SOURCE" \
            --base "$TARGET" \
            --title "Sync $SOURCE into $TARGET" \
            --body "Auto-opened after a push to $SOURCE, to bring $TARGET up to date."
